<text x="350" y="271" text-anchor="middle" dominant-baseline="central" fill="#3d8a6e" font-family="'Segoe UI',sans-serif" font-size="11">Pi-hole, Unbound</text>

<rect x="455" y="234" width="180" height="50" rx="10" fill="#173028" stroke="#1d9e75" stroke-width="0.5"/>
