<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 700 440" role="img">
<title>Jerarquía del homeserver: Cockpit, landing y pods de Podman</title>
<rect width="700" height="440" fill="#1e1e1e"/>

<rect x="10" y="10" width="680" height="420" rx="24" fill="#211b30" stroke="#7f77dd" stroke-width="0.5"/>
