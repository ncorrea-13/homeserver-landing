<text x="350" y="62" text-anchor="middle" dominant-baseline="central" fill="#a08fd6" font-family="'Segoe UI',sans-serif" font-size="12">Debian Trixie</text>

<rect x="40" y="90" width="290" height="60" rx="10" fill="#211533" stroke="#534ab7" stroke-width="0.5" stroke-dasharray="3 3"/>
